<meta charset="utf-8">
{{ hugo.Generator }}
<meta name="language" content="fi">
<meta name="author" content="Jarno Ruokamo">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="{{ .Site.Params.selite }}">
<meta name="robots" content="index,follow">
<link rel="canonical" href="{{ .Permalink }}" />
{{ with resources.Get "css/style.css" | minify }}
    <style>{{ .Content | safeCSS }}</style>
{{ end }}
{{ $fav := resources.Get "img/favicon.png" | fingerprint }}
{{ $wp := $fav.Resize "48x48 webp" | fingerprint }}
<link rel="icon" href="{{ $wp.RelPermalink }}" type="image/webp" />
<link rel="icon" href="{{ $fav.RelPermalink }}" type="image/png" />
<title>{{ .Site.Params.otsikko }}</title>
